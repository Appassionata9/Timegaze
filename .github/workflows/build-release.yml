name: Build desktop releases

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:mac

      - name: Create macOS archive
        run: ditto -c -k --sequesterRsrc --keepParent "release/观时 · Timegaze.app" release/Timegaze-macOS.zip

      - name: Publish macOS archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v1.0.0 release/Timegaze-macOS.zip --clobber

  windows:
    runs-on: windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: windows/package-lock.json

      - name: Install Windows dependencies
        run: npm ci
        working-directory: windows

      - name: Build Windows installer
        run: npm run build
        working-directory: windows

      - name: Publish Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v1.0.0 release/windows/Timegaze-Windows-Setup-1.0.0.exe --clobber
